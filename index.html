<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voideds Guns.lol</title>
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+NZ:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body {
            background:#000;
            overflow:hidden;
            height:100vh;
            width:100vw;
            font-family: 'Playwrite NZ', cursive;
        }
        #start-screen {
            position:fixed;
            top:0; left:0;
            width:100%; height:100vh;
            background:#000;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            color:white;
            z-index:100;
            transition:opacity 0.6s ease;
        }
        #start-text { font-size:52px; font-weight:700; margin-bottom:20px; letter-spacing:1px; }
        #instruction { font-size:28px; color:#00ff00; animation:pulse 1.8s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
        #bsod-screen {
            position:fixed;
            top:0; left:0;
            width:100%; height:100%;
            background:url('Bluescreen.png') no-repeat center/100%;
            display:none;
        }
        #mute-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: url('NotMuted.png') center/contain no-repeat;
            z-index: 1000;
            cursor: pointer;
            opacity: 0.9;
            transition: transform 0.2s;
        }
        #mute-btn:hover { transform: scale(1.1); }
        #mute-btn.muted {
            background: url('Muted.png') center/contain no-repeat;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <div id="start-text">click to continue</div>
        <div id="instruction">This is to allow the sound and stuff!</div>
    </div>

    <div id="bsod-screen"></div>
    <div id="mute-btn"></div>

    <script>
        let spaceHeld = false;
        let audio = new Audio('https://r2.guns.lol/89c58b02-2095-4eb6-bc84-fa161c2a3b8e.mp3');
        audio.volume = 0.5;
        audio.loop = true;
        let isMuted = false;

        function goFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen();
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
            else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
        }

        function toggleMute() {
            isMuted = !isMuted;
            const btn = document.getElementById('mute-btn');
            if (isMuted) {
                audio.volume = 0;
                btn.classList.add('muted');
            } else {
                audio.volume = 0.5;
                btn.classList.remove('muted');
            }
        }

        function showBlueScreen() {
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'none';
                const bsod = document.getElementById('bsod-screen');
                bsod.style.display = 'block';
                document.body.style.cursor = 'none';
                
                audio.currentTime = 0;
                audio.play().catch(() => {});

                setTimeout(goFullscreen, 150);

                setTimeout(() => {
                    bsod.style.backgroundImage = "url('Info.png')";
                    bsod.style.backgroundSize = "100%";
                    bsod.style.backgroundPosition = "center center";
                    document.body.style.cursor = 'default';
                }, 2000);
            }, 400);
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (!spaceHeld) {
                    spaceHeld = true;
                    showBlueScreen();
                }
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.code === 'Space') spaceHeld = false;
        });

        document.getElementById('start-screen').addEventListener('click', showBlueScreen);
        document.getElementById('mute-btn').addEventListener('click', toggleMute);
    </script>
</body>
</html>
